server {
    listen 80;
    server_name localhost;

    # ส่ง request /api/* → PHP-FPM (CodeIgniter 4)
    # document root: /var/www/backend/public, entry point: index.php
    location /api/ {
        fastcgi_pass  promo_php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /var/www/backend/public;
        # ส่ง REQUEST_URI เต็มเพื่อให้ CI4 router ทำงานถูกต้อง
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param PATH_INFO       $fastcgi_path_info;

        # รองรับ request body ใหญ่สำหรับ Excel upload
        client_max_body_size 50M;
    }

    # ส่ง request อื่นๆ → Angular dev server (port 4200)
    # รองรับ WebSocket สำหรับ HMR (Hot Module Replacement)
    location / {
        proxy_pass http://promo_frontend:4200;
        #proxy_pass http://promo_frontend_v2:4201;
        proxy_http_version 1.1;

        # ส่วน header ที่จำเป็นสำหรับ WebSocket upgrade (HMR)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
