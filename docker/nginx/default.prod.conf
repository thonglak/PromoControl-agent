# ─────────────────────────────────────────────────────────────
# Production Nginx — รวม Angular static + Reverse proxy ไป PHP-FPM
#  - / → static Angular app (HTML5 routing fallback ไป index.html)
#  - /api/* → fastcgi_pass promo_php_prod:9000
# หมายเหตุ:
#  - Production แนะนำให้มี SSL (Let's Encrypt) ที่ proxy ภายนอก หรือเปลี่ยน
#    listen 80 → 443 + ssl_certificate
# ─────────────────────────────────────────────────────────────

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # รองรับ Excel upload / payload ขนาดใหญ่
    client_max_body_size 50M;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Static assets cache (hashed filenames จาก Angular) ──
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Backend API → PHP-FPM ────────────────────────────────
    location /api/ {
        fastcgi_pass  promo_php_prod:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /var/www/backend/public;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param PATH_INFO       $fastcgi_path_info;

        fastcgi_buffer_size          128k;
        fastcgi_buffers              4 256k;
        fastcgi_busy_buffers_size    256k;
        fastcgi_read_timeout         120s;
    }

    # ── Angular SPA — HTML5 routing fallback ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── ห้าม access ไฟล์ลับ ──────────────────────────────────
    location ~ /\.(env|git|ht) {
        deny all;
        return 404;
    }
}
