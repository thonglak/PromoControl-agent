<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!--
    PWA bootstrap — inject manifest/title/apple-meta ก่อน browser preload
    เหตุผล: browser เริ่ม fetch <link rel=manifest> ทันทีที่เจอ tag → ถ้ามี static link
    แล้วเพิ่งมาแก้ href ด้วย script ใต้นั้น iOS อาจใช้ manifest ตัวที่ fetch ไปแล้ว
    Script นี้จึงต้อง inject ทั้ง 4 ตัว (manifest/title/apple-title/application-name)
    เป็นคนแรก ห้ามมี static tag เหล่านี้ใน HTML ก่อนหน้า
  -->
  <script>
    (function () {
      var isMonitor = location.pathname.indexOf('/monitor') === 0;
      var title = isMonitor ? 'PromoControl Monitor' : 'PromoControl';
      var manifestHref = isMonitor ? '/monitor/manifest.webmanifest' : '/manifest.webmanifest';

      document.title = title;

      function meta(name, content) {
        var m = document.createElement('meta');
        m.name = name;
        m.content = content;
        document.head.appendChild(m);
      }
      meta('apple-mobile-web-app-title', title);
      meta('application-name', title);

      var lk = document.createElement('link');
      lk.rel = 'manifest';
      lk.href = manifestHref;
      document.head.appendChild(lk);
    })();
  </script>

  <!-- PWA static tags (ค่าเหมือนกันทุก path) -->
  <meta name="theme-color" content="#0F4C81">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/monitor/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
