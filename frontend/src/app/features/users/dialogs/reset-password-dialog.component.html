<h2 mat-dialog-title class="!text-lg !font-semibold !text-slate-800">รีเซ็ตรหัสผ่าน</h2>

<mat-dialog-content class="!pt-4 !pb-2">
  <p class="text-sm text-slate-500 mb-4">
    รีเซ็ตรหัสผ่านให้ <strong class="text-slate-700">{{ data.userName }}</strong>
    — ผู้ใช้จะต้องเข้าสู่ระบบใหม่ด้วยรหัสผ่านนี้
  </p>

  <form [formGroup]="form" class="flex flex-col gap-4">

    <!-- รหัสผ่านใหม่ -->
    <mat-form-field appearance="outline">
      <mat-label>รหัสผ่านใหม่</mat-label>
      <input matInput formControlName="new_password"
             [type]="showPassword() ? 'text' : 'password'"
             placeholder="อย่างน้อย 8 ตัว" />
      <button type="button" mat-icon-button matSuffix
              (click)="showPassword.set(!showPassword())">
        <span class="text-xs text-slate-400">{{ showPassword() ? 'ซ่อน' : 'แสดง' }}</span>
      </button>
      @if (newPwErrors) {
        <mat-error>{{ newPwErrors }}</mat-error>
      }
    </mat-form-field>

    <!-- ยืนยันรหัสผ่าน -->
    <mat-form-field appearance="outline">
      <mat-label>ยืนยันรหัสผ่าน</mat-label>
      <input matInput formControlName="confirm_password"
             [type]="showConfirm() ? 'text' : 'password'"
             placeholder="กรอกรหัสผ่านอีกครั้ง" />
      <button type="button" mat-icon-button matSuffix
              (click)="showConfirm.set(!showConfirm())">
        <span class="text-xs text-slate-400">{{ showConfirm() ? 'ซ่อน' : 'แสดง' }}</span>
      </button>
      @if (confirmErrors) {
        <mat-error>{{ confirmErrors }}</mat-error>
      }
    </mat-form-field>

  </form>

  <p class="text-xs text-slate-400 mt-2">
    รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร ประกอบด้วยตัวพิมพ์ใหญ่ ตัวพิมพ์เล็ก และตัวเลข
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end" class="!px-6 !pb-4 !pt-2 gap-2">
  <button mat-stroked-button (click)="cancel()" [disabled]="saving()">ยกเลิก</button>
  <button mat-flat-button color="warn" (click)="save()" [disabled]="form.invalid || saving()">
    @if (saving()) {
      <mat-spinner diameter="18" class="!inline-block mr-1" />
    }
    รีเซ็ตรหัสผ่าน
  </button>
</mat-dialog-actions>
