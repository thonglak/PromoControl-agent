<div class="p-6" style="max-width: 1200px; margin: 0 auto;">

  <!-- Page header -->
  <app-page-header title="ตั้งค่า API Config" subtitle="จัดการการเชื่อมต่อ API ภายนอก (Narai Connect)">
    <div actions class="flex items-center gap-2">
      <button mat-stroked-button (click)="exportJson()"
              matTooltip="ส่งออก API Config ของโครงการเป็นไฟล์ JSON"
              class="flex items-center gap-2">
        <app-icon name="arrow-down-tray" class="w-4 h-4" /> ส่งออก JSON
      </button>
      @if (canWrite()) {
        <button mat-stroked-button (click)="triggerImport()"
                [disabled]="importing()"
                matTooltip="นำเข้า API Config จากไฟล์ JSON"
                class="flex items-center gap-2">
          @if (importing()) {
            <mat-spinner diameter="16" class="!inline-block" />
          } @else {
            <app-icon name="arrow-up-tray" class="w-4 h-4" />
          }
          นำเข้า JSON
        </button>
        <button mat-flat-button color="primary" (click)="openCreate()" class="flex items-center gap-2">
          <app-icon name="plus" class="w-4 h-4" />
          เพิ่ม API Config
        </button>
      }

      <!-- Hidden file input สำหรับนำเข้า JSON -->
      <input #importInput type="file" accept="application/json,.json"
             class="hidden" (change)="onImportFileSelected($event)" />
    </div>
  </app-page-header>

  <!-- Table card -->
  <app-section-card [noPadding]="true">
    <div class="relative">

      <!-- Loading overlay -->
      @if (loading()) {
        <div class="absolute inset-0 bg-white/70 flex items-center justify-center z-10">
          <mat-spinner diameter="36" />
        </div>
      }

      <div class="overflow-auto">
        <table mat-table [dataSource]="dataSource" class="w-full">

          <!-- Name -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef
                class="!text-xs !font-semibold !text-slate-500 !uppercase !tracking-wide !bg-slate-50">
              ชื่อ Config
            </th>
            <td mat-cell *matCellDef="let row" class="!text-sm !text-slate-800 !font-medium">
              {{ row.name }}
            </td>
          </ng-container>

          <!-- URL -->
          <ng-container matColumnDef="api_url">
            <th mat-header-cell *matHeaderCellDef
                class="!text-xs !font-semibold !text-slate-500 !uppercase !tracking-wide !bg-slate-50">
              API URL
            </th>
            <td mat-cell *matCellDef="let row"
                class="!text-sm !text-slate-600 !font-mono max-w-[360px] truncate"
                [matTooltip]="row.api_url">
              {{ row.api_url }}
            </td>
          </ng-container>

          <!-- Status -->
          <ng-container matColumnDef="is_active">
            <th mat-header-cell *matHeaderCellDef
                class="!text-xs !font-semibold !text-slate-500 !uppercase !tracking-wide !bg-slate-50 !text-center">
              สถานะ
            </th>
            <td mat-cell *matCellDef="let row" class="!text-center">
              @if (isActive(row)) {
                <span class="text-xs px-2 py-0.5 rounded-full font-medium bg-green-50 text-green-700">
                  เปิดใช้งาน
                </span>
              } @else {
                <span class="text-xs px-2 py-0.5 rounded-full font-medium bg-slate-100 text-slate-500">
                  ปิดใช้งาน
                </span>
              }
            </td>
          </ng-container>

          <!-- Actions -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef
                class="!text-xs !font-semibold !text-slate-500 !uppercase !tracking-wide !bg-slate-50 !text-center">
              จัดการ
            </th>
            <td mat-cell *matCellDef="let row" class="!text-center">
              <div class="flex justify-center gap-1">
                @if (canWrite()) {
                  <button mat-icon-button matTooltip="แก้ไข"
                          class="!text-slate-500 hover:!text-blue-600"
                          (click)="openEdit(row)">
                    <app-icon name="pencil-square" class="w-4 h-4" />
                  </button>
                  <button mat-icon-button matTooltip="ลบ"
                          class="!text-slate-500 hover:!text-red-600"
                          (click)="confirmDelete(row)">
                    <app-icon name="trash" class="w-4 h-4" />
                  </button>
                }
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"
              class="hover:bg-slate-50 transition-colors even:bg-slate-50/40"></tr>

          <!-- No data -->
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell text-center py-12 text-slate-400" [attr.colspan]="displayedColumns.length">
              <app-icon name="inbox" class="w-8 h-8 text-slate-300 mx-auto mb-2" />
              <p>ยังไม่มี API Config กรุณาเพิ่มใหม่</p>
            </td>
          </tr>

        </table>
      </div>
    </div>
  </app-section-card>

</div>
